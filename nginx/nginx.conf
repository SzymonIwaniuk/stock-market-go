upstream stock_market {
    server app1:8080 max_fails=1 fail_timeout=2s;
    server app2:8080 max_fails=1 fail_timeout=2s;
    server app3:8080 max_fails=1 fail_timeout=2s;
}

server {
    listen 80;

    location / {
        proxy_pass http://stock_market;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
