services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5

  app1:
    build: .
    command: ["-port", "8080", "-redis", "redis:6379"]
    restart: always
    depends_on:
      redis:
        condition: service_healthy

  app2:
    build: .
    command: ["-port", "8080", "-redis", "redis:6379"]
    restart: always
    depends_on:
      redis:
        condition: service_healthy

  app3:
    build: .
    command: ["-port", "8080", "-redis", "redis:6379"]
    restart: always
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    depends_on:
      - app1
      - app2
      - app3
